<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arena of Ideas — battle replay</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1>Arena of Ideas</h1>
      <p class="tagline">battle(teamA, teamB, seed) → causal event log — replayed below, computed in your browser.</p>

      <nav id="views" role="tablist">
        <button type="button" id="view-battle" class="tab active">battle</button>
        <button type="button" id="view-editor" class="tab">editor</button>
      </nav>

      <section id="battle-view">
      <form id="controls">
        <label>
          Team A
          <select id="team-a"></select>
        </label>
        <label>
          Team B
          <select id="team-b"></select>
        </label>
        <label>
          Seed
          <span class="seed-row">
            <input id="seed" type="number" value="0" step="1" />
            <button type="button" id="randomize" title="Random seed">🎲</button>
          </span>
        </label>
        <button type="submit" id="run">Run battle</button>
        <p id="seed-error" role="alert" hidden></p>
        <p id="run-error" role="alert" hidden></p>
      </form>

      <section id="result" hidden>
        <div id="tabs" role="tablist">
          <button type="button" id="tab-board" class="tab active">board</button>
          <button type="button" id="tab-text" class="tab">text replay</button>
        </div>

        <section id="board-panel">
          <div id="board"></div>
          <div id="transport">
            <button type="button" id="step-prev" title="Previous event (←)">‹ prev</button>
            <button type="button" id="step-play">play</button>
            <button type="button" id="step-next" title="Next event (→)">next ›</button>
            <select id="speed" title="Playback speed">
              <option value="0.5">0.5×</option>
              <option value="1" selected>1×</option>
              <option value="2">2×</option>
              <option value="4">4×</option>
            </select>
            <span id="step-label"></span>
          </div>
          <input id="scrub" type="range" min="0" max="0" value="0" step="1" title="Scrub events" />
          <div id="event-panel">
            <div id="event-desc"></div>
            <div id="event-cause"></div>
          </div>
        </section>

        <pre id="replay" hidden></pre>
      </section>
      </section>

      <section id="editor-view" hidden>
        <div id="editor-bar">
          <label>
            Saved teams
            <select id="ed-team-select"></select>
          </label>
          <span class="ed-buttons">
            <button type="button" id="ed-new">new</button>
            <button type="button" id="ed-delete">delete</button>
            <button type="button" id="ed-import">import</button>
            <button type="button" id="ed-export">export</button>
          </span>
          <input id="ed-file" type="file" accept=".json,application/json" hidden />
          <p id="ed-import-error" role="alert" hidden></p>
        </div>

        <label id="ed-name-row">
          Team name
          <input id="ed-name" placeholder="name this team" />
        </label>

        <div id="ed-units"></div>

        <div id="ed-add-row">
          <select id="ed-template" title="Unit template"></select>
          <button type="button" id="ed-add">add unit</button>
        </div>

        <div id="ed-verdict" role="status"></div>
        <ul id="ed-issues"></ul>
      </section>

      <footer id="kernel-version"></footer>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
