name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install --no-install-recommends libasound2-dev libudev-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build shared + client
        run: cargo build -p shared -p client

      - name: Build server (WASM)
        run: cargo build -p server --target wasm32-unknown-unknown

      - name: Run unit tests
        run: cargo test -p shared -p client --lib

      - name: Build client for WASM
        run: cargo build -p client --target wasm32-unknown-unknown

      - name: Clippy (shared + client)
        run: cargo clippy -p shared -p client -- -W clippy::all

      - name: Clippy (server)
        run: cargo clippy -p server --target wasm32-unknown-unknown -- -W clippy::all
